<script>
        // --- INICIALIZACIÓN DE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5F10FeOf1cAO_6j3v_OR8WHIxw-lQo6w",
            authDomain: "novagetristy.firebaseapp.com",
            projectId: "novagetristy",
            storageBucket: "novagetristy.firebasestorage.app",
            messagingSenderId: "428175556961",
            appId: "1:428175556961:web:2f227bdd521a8994b34520"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- SISTEMA DE ESTRELLAS USADAS ---
        let usedStars = [];
        async function fetchUsedStars() {
            try {
                const snapshot = await db.collection("estrellas").get();
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if(data.official) usedStars.push(data.official);
                });
            } catch(e) {
                console.error("Aviso: No se pudo cargar el historial.", e);
            }
        }
        window.onload = fetchUsedStars;

        // --- SECRETO MODO ADMINISTRADOR (MADRES) ---
        let adminClickCount = 0;
        let lastClickTime = 0;
        let isAdminActive = false;

        function handleLogoClick() {
            showSection('home');
            let currentTime = new Date().getTime();
            if (currentTime - lastClickTime > 1500) { adminClickCount = 0; }
            adminClickCount++;
            lastClickTime = currentTime;

            if (adminClickCount === 5) {
                adminClickCount = 0;
                let pwd = prompt("Terminal Maestro. Ingrese clave secreta:");
                if (pwd === "NOVA2026") {
                    isAdminActive = true;
                    alert("🚀 MODO ADMIN MATERNAL ACTIVADO.\nCompras gratuitas con estrellas VIP para madres.");
                } else if (pwd !== null) {
                    alert("Acceso denegado.");
                }
            }
        }

        // --- NAVEGACIÓN Y MENÚ ---
        function triggerMobilePrint() {
            setTimeout(function() { window.print(); }, 300);
        }
        
        function toggleMenu() { 
            document.querySelector('.nav-links').classList.toggle('active'); 
        }

        function showSection(sectionId) {
            document.querySelectorAll('section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active-link'));
            document.getElementById(sectionId).classList.add('active');
            document.querySelector('.nav-links').classList.remove('active');
            
            if(sectionId === 'home') document.getElementById('link-home').classList.add('active-link');
            if(sectionId === 'firmamento') {
                document.getElementById('link-firm').classList.add('active-link');
                if(!canvasInitialized) initBackgroundSky();
            }
            if(sectionId === 'mystar') document.getElementById('link-mystar').classList.add('active-link');
        }

        // --- SISTEMA VR / PARALLAX ---
        const canvas = document.getElementById('skyCanvas');
        const ctx = canvas.getContext('2d');
        let backgroundStars = [];
        let canvasInitialized = false;
        let rotAngle = 0;
        let targetOffsetX = 0, targetOffsetY = 0;
        let currentOffsetX = 0, currentOffsetY = 0;

        window.addEventListener('mousemove', (e) => {
            const centerX = window.innerWidth / 2; const centerY = window.innerHeight / 2;
            targetOffsetX = (e.clientX - centerX) * 0.05; targetOffsetY = (e.clientY - centerY) * 0.05;
        });

        function initBackgroundSky() {
            canvasInitialized = true; resizeCanvas(); window.addEventListener('resize', resizeCanvas);
            const spectralColors = ['#9bb0ff', '#aabfff', '#ffffff', '#ffebca', '#ffcc6f', '#ff9632', '#ff2a00'];
            for(let i=0; i<800; i++) {
                let size = Math.random() * 2 + 0.2; let color = spectralColors[Math.floor(Math.random() * spectralColors.length)];
                backgroundStars.push({ x: Math.random() * 3000 - 1500, y: Math.random() * 3000 - 1500, z: Math.random() * 2 + 0.1, size: size, baseColor: color, alpha: Math.random() * 0.8 + 0.2 });
            }
            renderAmbientSky();
        }

        function resizeCanvas() {
            if(canvas.parentElement) { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
        }

        function renderAmbientSky() {
            ctx.fillStyle = 'rgba(1, 2, 5, 0.4)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2; const cy = canvas.height / 2;
            rotAngle += 0.00015; const sinA = Math.sin(rotAngle); const cosA = Math.cos(rotAngle);
            currentOffsetX += (targetOffsetX - currentOffsetX) * 0.05; currentOffsetY += (targetOffsetY - currentOffsetY) * 0.05;

            backgroundStars.forEach(star => {
                const rotX = star.x * cosA - star.y * sinA; const rotY = star.y * cosA + star.x * sinA;
                const screenX = rotX + cx + (currentOffsetX * star.z); const screenY = rotY + cy + (currentOffsetY * star.z);
                
                if(screenX > -10 && screenX < canvas.width + 10 && screenY > -10 && screenY < canvas.height + 10) {
                    let flicker = star.alpha + Math.sin(Date.now() * 0.001 * star.z) * 0.3;
                    flicker = Math.max(0.1, Math.min(1, flicker));
                    ctx.beginPath(); ctx.arc(screenX, screenY, star.size, 0, Math.PI * 2); 
                    let r = parseInt(star.baseColor.slice(1, 3), 16); let g = parseInt(star.baseColor.slice(3, 5), 16); let b = parseInt(star.baseColor.slice(5, 7), 16);
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${flicker})`; ctx.fill();
                }
            });
            requestAnimationFrame(renderAmbientSky);
        }

        // --- CATÁLOGO DE ESTRELLAS NORMALES ---
        const valenciaVisibleStars = [
            { official: "HD 129245 (Seginus)", ra: "14h 32m 04s", dec: "+38° 18' 28\"", distance: "85 A.L.", spectral: "A7 III (Blanca)", temp: "7650 K", appMag: "3.03", lum: "74 Soles", lore: "El hombro del Pastor de Boyeros. Un símbolo de resiliencia y trabajo incansable elevado a los cielos." },
            { official: "HD 183912 (Albireo)", ra: "19h 30m 43s", dec: "+27° 57' 34\"", distance: "430 A.L.", spectral: "K3 II (Naranja)", temp: "4270 K", appMag: "3.05", lum: "1200 Soles", lore: "El ave celestial del firmamento. Representa la libertad y la belleza infinita surcando el espacio." },
            { official: "HD 112846 (Cor Caroli)", ra: "12h 56m 01s", dec: "+38° 19' 06\"", distance: "114 A.L.", spectral: "A0 Vp (Magnética)", temp: "11600 K", appMag: "2.89", lum: "101 Soles", lore: "El 'Corazón Noble'. Una estrella que brilló para anunciar un regreso triunfal y lleno de amor." },
            { official: "HD 173168 (Aladfar)", ra: "18h 42m 16s", dec: "+31° 46' 16\"", distance: "274 A.L.", spectral: "B9 V (Azul-Blanca)", temp: "10500 K", appMag: "4.36", lum: "135 Soles", lore: "Una luz inquebrantable en la oscuridad, sirvió como guía a antiguos nómadas para siempre encontrar el camino a casa." }
        ];

        // --- CATÁLOGO MÍTICO PARA MADRES (ADMIN) ---
        const motherStars = [
            { official: "HD 116658 (Espiga)", ra: "13h 25m 11s", dec: "-11° 09' 40\"", distance: "250 A.L.", spectral: "B1 III-IV (Azul)", temp: "22400 K", appMag: "0.98", lum: "12100 Soles", lore: "La estrella más brillante de Virgo, representa a Deméter, la gran diosa madre. Un faro de amor maternal incondicional y protección infinita." },
            { official: "HD 5015 (Cassiopeia)", ra: "00h 56m 42s", dec: "+60° 43' 00\"", distance: "54 A.L.", spectral: "F2 III (Blanca)", temp: "7000 K", appMag: "2.28", lum: "71 Soles", lore: "La reina madre del firmamento. Elevada a las estrellas por el orgullo y devoción inquebrantable hacia su linaje." },
            { official: "HD 23408 (Maia)", ra: "03h 45m 49s", dec: "+24° 22' 04\"", distance: "360 A.L.", spectral: "B8 III (Azul)", temp: "12600 K", appMag: "3.87", lum: "660 Soles", lore: "La hermana mayor de las Pléyades. Sagrada y conocida en el mito como 'la madre nutricia'. Su manto estelar arropa a todos desde la Tierra." }
        ];

        // --- LÓGICA DE PAGO (PAYPAL) ---
        let checkoutPrice = 0;
        let checkoutPackage = "";
        let starNamePending = "";
        let paypalRendered = false;

        function openPayment(price, packageName) {
            starNamePending = document.getElementById('inputStarName').value.trim();
            if(starNamePending === "") { 
                alert("Para continuar, introduzca el Nombre Oficial de la estrella."); 
                document.getElementById('inputStarName').focus(); return; 
            }
            checkoutPackage = packageName;

            // Si es admin, proceso gratuito
            if(isAdminActive) { executeRealStarAssignment("Administrador (Regalo de Madre)"); return; }

            checkoutPrice = price; 
            document.getElementById('checkoutDesc').innerText = packageName;
            document.getElementById('checkoutAmount').innerText = price.toFixed(2) + " €";
            
            // Hacemos visible el modal primero para que PayPal pueda calcular su tamaño
            document.getElementById('paymentModal').style.display = 'flex';

            // Solo cargamos PayPal la primera vez que se abre una ventana para que no se rompa
            if (!paypalRendered) {
                setTimeout(() => {
                    if (window.paypal) {
                        paypal.Buttons({
                            style: { shape: 'rect', color: 'gold', layout: 'vertical', label: 'pay' },
                            createOrder: function(data, actions) { 
                                // Esto lee el precio actual justo en el momento de hacer clic en pagar
                                return actions.order.create({ 
                                    purchase_units: [{ amount: { value: checkoutPrice.toString() } }] 
                                }); 
                            },
                            onApprove: function(data, actions) {
                                return actions.order.capture().then(function(details) {
                                    closePaymentModal(); 
                                    executeRealStarAssignment(details.payer.name.given_name);
                                });
                            },
                            onError: function(err) { 
                                console.error("Error PayPal:", err); 
                            }
                        }).render('#paypal-button-container');
                        
                        paypalRendered = true; // Marcamos como cargado
                    } else {
                        alert("No se pudo cargar la pasarela de pago. Asegúrate de no tener bloqueadores de anuncios (AdBlock/Brave).");
                    }
                }, 50); // Pequeño retraso para que el display:flex surta efecto
            }
        }

        function closePaymentModal() { 
            document.getElementById('paymentModal').style.display = 'none'; 
        }

        // --- ASIGNACIÓN EN FIREBASE ---
        async function executeRealStarAssignment(payerName) {
            const overlay = document.getElementById('processingOverlay');
            overlay.style.display = 'flex';

            const catalogToUse = isAdminActive ? motherStars : valenciaVisibleStars;
            let availableStars = catalogToUse.filter(star => !usedStars.includes(star.official));

            if(availableStars.length === 0) {
                overlay.style.display = 'none';
                alert("¡Lo sentimos! Todas las estrellas de este catálogo ya han sido compradas.");
                return;
            }

            const realStar = availableStars[Math.floor(Math.random() * availableStars.length)];
            let newCode = 'NOVA-' + Math.floor(10000 + Math.random() * 90000);

            const starData = {
                id: newCode, name: starNamePending.toUpperCase(), official: realStar.official, ra: realStar.ra, dec: realStar.dec,
                date: new Date().toLocaleDateString('es-ES', { day: '2-digit', month: 'long', year: 'numeric' }),
                distance: realStar.distance, pack: checkoutPackage, spectral: realStar.spectral, temp: realStar.temp, appMag: realStar.appMag, lum: realStar.lum,
                lore: realStar.lore
            };

            try {
                await db.collection("estrellas").doc(newCode).set(starData);
                usedStars.push(realStar.official);

                overlay.style.display = 'none';
                document.getElementById('inputStarName').value = '';
                alert(`¡COMPRA CONFIRMADA, ${payerName}!\n\nSe le ha adjudicado la estrella: ${starData.official}\nCódigo de Acceso: ${newCode}`);
                showSection('mystar');
                document.getElementById('myStarInput').value = newCode;
                loadMyStar();
            } catch(error) {
                console.error("Error Firebase:", error);
                overlay.style.display = 'none';
                alert("Fallo la sincronización con la base de datos.");
            }
        }

        // --- RECUPERAR CERTIFICADO ---
        async function loadMyStar() {
            const input = document.getElementById('myStarInput').value.toUpperCase().replace(/\s+/g, '');
            if(!input) { alert("Introduzca un código válido."); return; }

            try {
                const docRef = await db.collection("estrellas").doc(input).get();

                if (docRef.exists) {
                    const star = docRef.data();
                    document.getElementById('loginStar').style.display = 'none';
                    document.getElementById('certificatePanel').style.display = 'flex';

                    document.getElementById('certId').innerText = star.id;
                    document.getElementById('certOfficialCodeTop').innerText = star.official;
                    document.getElementById('certDate').innerText = star.date;
                    document.getElementById('certName').innerText = star.name;
                    document.getElementById('certOfficial').innerText = star.official;
                    document.getElementById('certRA').innerText = star.ra;
                    document.getElementById('certDEC').innerText = star.dec;
                    document.getElementById('certDist').innerText = star.distance;
                    document.getElementById('certClass').innerText = star.spectral;
                    document.getElementById('certTemp').innerText = star.temp;
                    document.getElementById('certAppMag').innerText = star.appMag;
                    document.getElementById('certLum').innerText = star.lum;
                    document.getElementById('certBarcode').innerText = `*${star.id.replace('-','')}*`;

                    document.getElementById('certLore').innerText = star.lore ? `"${star.lore}"` : "";
                } else {
                    alert('Código no localizado en los Archivos Celestiales.');
                }
            } catch (error) {
                console.error("Error BD:", error);
                alert("Fallo de conexión con el servidor.");
            }
        }
    </script>
</body>
